{% extends "base.html" %}
{% block title %}New Post - Forum{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title mb-4">
                    <i class="bi bi-pencil-square"></i> Create New Post
                </h3>
                <form id="create-post-form" onsubmit="submitPost(event)" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" name="title" required autofocus
                               maxlength="200" placeholder="Enter post title...">
                    </div>
                    <div class="mb-3">
                        <label for="content" class="form-label">Content</label>
                        <textarea class="form-control" id="content" name="content" rows="8" required
                                  placeholder="Write your post content..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="image" class="form-label">
                            <i class="bi bi-image"></i> Attach Image (optional)
                        </label>
                        <input type="file" class="form-control" id="image" name="image"
                               accept="image/png,image/jpeg,image/gif,image/webp">
                        <div id="image-preview" class="mt-2" style="display:none;">
                            <img id="preview-img" src="" alt="Preview" class="img-thumbnail" style="max-height: 200px;">
                            <button type="button" class="btn btn-sm btn-outline-danger ms-2" onclick="clearImage()">
                                <i class="bi bi-x"></i> Remove
                            </button>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_anonymous" name="is_anonymous">
                        <label class="form-check-label" for="is_anonymous">
                            <i class="bi bi-incognito"></i> Post anonymously
                        </label>
                        <small class="form-text text-muted d-block">
                            Your username will be hidden from other users.
                        </small>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary" id="submit-btn">
                            <i class="bi bi-send"></i> Publish
                        </button>
                        <a href="{{ url_for('posts.index') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Image preview
document.getElementById('image').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('preview-img').src = ev.target.result;
            document.getElementById('image-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
});

function clearImage() {
    document.getElementById('image').value = '';
    document.getElementById('image-preview').style.display = 'none';
}

function submitPost(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;

    const formData = new FormData();
    formData.append('title', document.getElementById('title').value);
    formData.append('content', document.getElementById('content').value);

    const imageFile = document.getElementById('image').files[0];
    if (imageFile) {
        formData.append('image', imageFile);
    }

    if (document.getElementById('is_anonymous').checked) {
        formData.append('is_anonymous', 'on');
    }

    fetch('{{ url_for("posts.create_post") }}', {
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        body: formData
    }).then(r => r.json()).then(data => {
        if (data.success) {
            window.location.href = '/';
        } else {
            alert(data.error || 'Failed to create post.');
            btn.disabled = false;
        }
    }).catch(() => {
        alert('Network error.');
        btn.disabled = false;
    });
}
</script>
{% endblock %}
