services:
  app:
    image: forum-app:latest
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ADMIN_USERNAME=admin
    secrets:
      - secret_key
      - db_password
      - admin_password
    volumes:
      - uploads-data:/app/uploads
    # Note: DATABASE_URL is constructed at runtime from /run/secrets/db_password
    # See app/config.py _read_secret()
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - forum-network

  postgres:
    image: postgres:16-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    environment:
      POSTGRES_DB: forum
      POSTGRES_USER: forum
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - forum-network

  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - redis-data:/data
    networks:
      - forum-network

  prometheus:
    image: prom/prometheus:latest
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - forum-network

  grafana:
    image: grafana/grafana:latest
    deploy:
      replicas: 1
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
    secrets:
      - grafana_admin_password
    networks:
      - forum-network

  node-exporter:
    image: prom/node-exporter:latest
    deploy:
      mode: global
    networks:
      - forum-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    deploy:
      replicas: 1
    secrets:
      - db_password
    entrypoint:
      - /bin/sh
      - -c
      - 'export DATA_SOURCE_NAME="postgresql://forum:$$(cat /run/secrets/db_password)@postgres:5432/forum?sslmode=disable" && exec /bin/postgres_exporter'
    networks:
      - forum-network

  backup:
    image: postgres:16-alpine
    deploy:
      replicas: 1
    volumes:
      - backup-data:/backups
      - ./scripts/backup.sh:/backup.sh
    entrypoint: ["/bin/sh", "-c", "export PGPASSWORD=$(cat /run/secrets/db_password) && chmod +x /backup.sh && while true; do /backup.sh; sleep 3600; done"]
    environment:
      PGHOST: postgres
      PGUSER: forum
      PGDATABASE: forum
    secrets:
      - db_password
    networks:
      - forum-network

  auto-scaler:
    image: forum-app:latest
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["python", "scripts/auto_scale.py"]
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - SERVICE_NAME=forum_app
      - MIN_REPLICAS=2
      - MAX_REPLICAS=10
    networks:
      - forum-network

secrets:
  secret_key:
    external: true
  db_password:
    external: true
  admin_password:
    external: true
  grafana_admin_password:
    external: true

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  backup-data:
  uploads-data:

networks:
  forum-network:
    driver: overlay
